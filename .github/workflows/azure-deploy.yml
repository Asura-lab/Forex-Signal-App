name: Quality Gates and Azure Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy (branch/tag/sha)
        required: true
        default: main
      environment:
        description: Azure deploy environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      run_smoke_tests:
        description: Run post-deploy smoke test
        required: true
        default: true
        type: boolean
      confirm_deploy:
        description: Type DEPLOY_AZURE to confirm deployment
        required: true
        default: ""

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.ref }}

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.lock.txt
          pip check
          pip install ruff pip-audit

      - name: Backend lint and syntax checks
        run: |
          ruff check backend tests --select E9,F63,F7,F82
          python -m compileall -q backend

      - name: Backend contract and scope tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Deterministic rerun fail-fast check
        run: python tests/deterministic_rerun_check.py

      - name: Basic security scan (dependency audit)
        run: pip-audit -r backend/requirements.lock.txt --no-deps

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile_app/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile_app
        run: npm ci

      - name: Mobile tests
        working-directory: mobile_app
        run: npm test -- --watch=false

      - name: Mobile dependency audit (blocking)
        working-directory: mobile_app
        run: npm audit --omit=dev --audit-level=high

  build-and-deploy:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_deploy == 'DEPLOY_AZURE' }}
    needs: quality-gates
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    concurrency:
      group: azure-deploy-${{ github.event.inputs.environment }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies into virtualenv
        working-directory: backend
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Zip backend with virtualenv
        run: |
          cd backend
          zip -r ../backend.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Predictrix'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: './backend.zip'

      - name: Post-deploy smoke test
        if: ${{ github.event.inputs.run_smoke_tests == 'true' }}
        run: |
          APP_URL="${{ vars.AZURE_APP_URL }}"
          if [ -z "$APP_URL" ]; then
            APP_URL="https://predictrix.azurewebsites.net"
          fi

          echo "Running smoke test against: $APP_URL/health"
          curl -fsS "$APP_URL/health"
