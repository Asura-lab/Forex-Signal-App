app = "predictrix-api"
primary_region = "nrt"
[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"
  STRICT_RUNTIME_SECRETS = "true"
  ALLOW_LOCAL_DOTENV = "false"

[processes]
  app = "sh ./start-api.sh"
  worker = "sh ./start-worker.sh"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  path = "/health"
  protocol = "http"
  timeout = "5s"






